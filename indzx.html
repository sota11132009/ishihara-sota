<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>鬼の目鏡 - Realistic Horror</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Courier New', Courier, monospace; }
        #onime { 
            position: absolute; top: 20px; right: 20px; 
            width: 320px; height: 180px; 
            border: 2px solid #333; box-shadow: 0 0 20px rgba(255,0,0,0.2);
            background: #000; overflow: hidden;
        }
        /* 鬼の視界に走査線ノイズを追加 */
        #onime::after {
            content: "ONI VIEW"; position: absolute; top: 10px; left: 10px; color: red; font-size: 12px; font-weight: bold;
        }
        #ui { position: absolute; bottom: 30px; left: 30px; color: #aaa; pointer-events: none; letter-spacing: 0.1em; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="ui">
        <p>STATUS: <span id="detection" style="color: #666;">HIDDEN</span></p>
    </div>
    <div id="onime"></div>

<script type="importmap">
{
    "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" }
}
</script>

<script type="module">
import * as THREE from 'three';

// --- シーン構築 ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020202);
scene.fog = new THREE.FogExp2(0x020202, 0.08); // 濃い霧で奥行きを出す

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true; // 影を有効化
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// メインカメラ
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);

// 鬼のカメラとレンダラー
const oniCamera = new THREE.PerspectiveCamera(80, 320 / 180, 0.1, 50);
const oniRenderer = new THREE.WebGLRenderer({ antialias: true });
oniRenderer.setSize(320, 180);
document.getElementById('onime').appendChild(oniRenderer.domElement);

// --- ライティング（重要：リアルな陰影） ---
const ambientLight = new THREE.AmbientLight(0x404040, 0.2); // 極めて暗い環境光
scene.add(ambientLight);

// プレイヤーの周囲をかすかに照らす（自分の足元だけ見える）
const playerLight = new THREE.PointLight(0xffffff, 15, 10);
playerLight.castShadow = true;
scene.add(playerLight);

// 鬼のサーチライト（これに当たるとバレる）
const oniSpotLight = new THREE.SpotLight(0xff0000, 50, 20, Math.PI/4, 0.5, 1);
oniSpotLight.castShadow = true;
scene.add(oniSpotLight);

// --- オブジェクト ---
// 床：白〜灰色のコンクリート風
const floorGeo = new THREE.PlaneGeometry(200, 200);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.8, metalness: 0.2 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// 壁：濃いグレー
function addWall(x, z, w, d) {
    const geo = new THREE.BoxGeometry(w, 5, d);
    const mat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 });
    const wall = new THREE.Mesh(geo, mat);
    wall.position.set(x, 2.5, z);
    wall.castShadow = true;
    wall.receiveShadow = true;
    scene.add(wall);
}
// 迷路のような配置
addWall(0, -10, 20, 1);
addWall(10, 0, 1, 20);
addWall(-10, 5, 1, 10);
addWall(5, 15, 15, 1);

// プレイヤー（カプセル型で人間に近く）
const player = new THREE.Group();
const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 1, 4, 8), new THREE.MeshStandardMaterial({color: 0x333333}));
body.position.y = 1;
player.add(body);
scene.add(player);

// 鬼（不気味な浮遊体）
const oni = new THREE.Mesh(new THREE.SphereGeometry(0.8, 16, 16), new THREE.MeshStandardMaterial({color: 0x000000, emissive: 0x330000}));
scene.add(oni);

// --- アニメーション ---
const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

let oniAngle = 0;

function update() {
    const speed = 0.12;
    if (keys['KeyW'] || keys['ArrowUp']) player.position.z -= speed;
    if (keys['KeyS'] || keys['ArrowDown']) player.position.z += speed;
    if (keys['KeyA'] || keys['ArrowLeft']) player.position.x -= speed;
    if (keys['KeyD'] || keys['ArrowRight']) player.position.x += speed;

    playerLight.position.set(player.position.x, 2, player.position.z);

    // カメラをプレイヤーの背後に滑らかに追従させる
    const targetCamPos = new THREE.Vector3(player.position.x, 6, player.position.z + 8);
    camera.position.lerp(targetCamPos, 0.1);
    camera.lookAt(player.position);

    // 鬼の知能：ゆっくり徘徊し、プレイヤーを探す
    oniAngle += 0.005;
    oni.position.x = Math.sin(oniAngle * 2) * 15;
    oni.position.z = Math.cos(oniAngle) * 15;
    oni.position.y = 1.5 + Math.sin(oniAngle * 5) * 0.2;

    // 鬼の視線（プレイヤーをじわじわ追い詰める）
    oniCamera.position.copy(oni.position);
    oniCamera.lookAt(player.position);
    
    oniSpotLight.position.copy(oni.position);
    oniSpotLight.target = player; // 常にプレイヤーを狙う（恐怖演出）

    // 判定（距離と光による簡易判定）
    const dist = oni.position.distanceTo(player.position);
    const detectionUI = document.getElementById('detection');
    if (dist < 10) {
        detectionUI.innerText = "CAUTION";
        detectionUI.style.color = "orange";
    } else {
        detectionUI.innerText = "HIDDEN";
        detectionUI.style.color = "#666";
    }
}

function animate() {
    requestAnimationFrame(animate);
    update();
    renderer.render(scene, camera);
    oniRenderer.render(scene, oniCamera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>

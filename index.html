<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ZOMBIE CITY - SKY BLUE & SLOW ZOMBIES</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Courier New', monospace; }
        
        /* UIレイアウト */
        #ui { position: absolute; top: 20px; left: 20px; color: #000; pointer-events: none; z-index: 10; background: rgba(255,255,255,0.9); padding: 15px; border: 3px solid #333; border-radius: 8px; }
        .bar-container { width: 220px; height: 15px; background: rgba(0,0,0,0.1); margin-bottom: 8px; border: 2px solid #333; }
        #hp-bar { width: 100%; height: 100%; background: #ff5252; transition: width 0.3s; }
        #stamina-bar { width: 100%; height: 100%; background: #4caf50; transition: width 0.1s; }
        #ammo-ui { font-size: 26px; font-weight: bold; margin-top: 5px; color: #333; }
        
        /* 照準（ピンクで分かりやすく） */
        #reticle { position: absolute; top: 50%; left: 50%; width: 44px; height: 44px; transform: translate(-50%, -50%); pointer-events: none; z-index: 20; }
        .reticle-line { position: absolute; background: #ff00ff; }
        .v-line { left: 21px; width: 2px; height: 12px; }
        .h-line { top: 21px; height: 2px; width: 12px; }
        #ret-top { top: 0; } #ret-bottom { bottom: 0; } #ret-left { left: 0; } #ret-right { right: 0; }
        #ret-dot { position: absolute; top: 20px; left: 20px; width: 4px; height: 4px; background: #ff00ff; border-radius: 50%; }

        #minimap { position: absolute; top: 20px; right: 20px; border: 3px solid #333; background: #fff; z-index: 10; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 100; }
        button { padding: 20px 50px; font-size: 28px; background: #333; color: #fff; border: 3px solid #fff; cursor: pointer; }
        #msg { position: absolute; bottom: 30px; width: 100%; text-align: center; color: #000; font-weight: bold; font-size: 18px; text-shadow: 1px 1px 2px white; }
    </style>
</head>
<body>
    <div id="ui">
        HP <div class="bar-container"><div id="hp-bar"></div></div>
        STAMINA <div class="bar-container"><div id="stamina-bar"></div></div>
        <div id="ammo-ui"><span id="wp-name">Handgun</span>: <span id="ammo-cur">∞</span></div>
        <div id="score-ui">SCORE: <span id="score">0</span></div>
    </div>

    <div id="reticle">
        <div id="ret-top" class="reticle-line v-line"></div>
        <div id="ret-bottom" class="reticle-line v-line"></div>
        <div id="ret-left" class="reticle-line h-line"></div>
        <div id="ret-right" class="reticle-line h-line"></div>
        <div id="ret-dot"></div>
    </div>

    <canvas id="minimap" width="160" height="160"></canvas>
    <div id="overlay"><h1>GAME OVER</h1><button onclick="location.reload()">RETRY</button></div>
    <div id="msg">クリックで開始 | 矢印キー:移動 | SPACE:射撃 | ENTER:武器変更 | CTRL:リロード</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- 1. 世界の設定（空色と明るい光） ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // 鮮やかな空色
        scene.fog = new THREE.Fog(0x87CEEB, 60, 250);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // ライティング（非常に明るく）
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.4);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
        sunLight.position.set(20, 60, 20);
        scene.add(sunLight);

        // 地面と建物
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshPhongMaterial({color: 0xcccccc}));
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);

        for(let i=0; i<60; i++) {
            let x = (Math.random()-0.5)*400, z = (Math.random()-0.5)*400;
            if(Math.abs(x) > 15 || Math.abs(z) > 15) {
                const h = 5 + Math.random() * 25;
                const b = new THREE.Mesh(new THREE.BoxGeometry(12, h, 12), new THREE.MeshPhongMaterial({color: 0xffffff}));
                b.position.set(x, h/2, z);
                scene.add(b);
            }
        }

        // --- 2. ゲームデータ（ゾンビを遅く） ---
        let hp = 100, stamina = 100, score = 0, isDead = false;
        const zombies = [], bullets = [], keys = {};
        
        const weapons = {
            1: { name: "Handgun", ammo: Infinity, cooldown: 350, spread: 0, count: 1, speed: 2.5 },
            2: { name: "Shotgun", ammo: 8, cooldown: 900, spread: 0.12, count: 6, speed: 2.0 },
            3: { name: "SMG", ammo: 40, cooldown: 110, spread: 0.05, count: 1, speed: 2.8 }
        };
        let wpIdx = 1, currentWp = weapons[wpIdx], lastShot = 0;

        function spawnZombie() {
            if (zombies.length >= 5) return; 

            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.4, 0.5), new THREE.MeshPhongMaterial({color: 0x4a7c44}));
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshPhongMaterial({color: 0x2d4d29}));
            head.position.y = 1.0;
            group.add(body); group.add(head);
            
            const ang = Math.random()*Math.PI*2;
            const dist = 50 + Math.random()*20;
            group.position.set(camera.position.x + Math.cos(ang)*dist, 0.7, camera.position.z + Math.sin(ang)*dist);
            
            // 速度を 0.02 まで低下（かなりゆっくり）
            group.userData = { hp: 3, speed: 0.02, flash: 0 };
            zombies.push(group);
            scene.add(group);
        }

        for(let i=0; i<5; i++) spawnZombie();

        // --- 3. 操作ロジック ---
        window.addEventListener('keydown', e => { 
            keys[e.code] = true;
            if(e.code === 'Enter') { 
                wpIdx = (wpIdx % 3) + 1; 
                currentWp = weapons[wpIdx]; 
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);
        document.body.addEventListener('click', () => { if(!isDead) document.body.requestPointerLock(); });

        function shoot() {
            const now = Date.now();
            if(now - lastShot < currentWp.cooldown) return;
            lastShot = now;

            for(let i=0; i<currentWp.count; i++) {
                const b = new THREE.Mesh(new THREE.SphereGeometry(0.12), new THREE.MeshBasicMaterial({color: 0x222222}));
                b.position.copy(camera.position);
                const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                dir.x += (Math.random()-0.5)*currentWp.spread;
                b.userData.vel = dir.normalize().multiplyScalar(currentWp.speed);
                bullets.push(b); scene.add(b);
            }
        }

        let yaw = 0, pitch = 0;
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                yaw -= e.movementX * 0.0025; pitch -= e.movementY * 0.0025;
                pitch = Math.max(-1.5, Math.min(1.5, pitch));
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
            }
        });

        // --- 4. メインループ ---
        function animate() {
            requestAnimationFrame(animate);
            if(isDead) return;
            if(hp <= 0) { isDead = true; document.getElementById('overlay').style.display = 'flex'; document.exitPointerLock(); return; }

            let speed = keys['ShiftLeft'] ? 0.25 : 0.14;
            const move = new THREE.Vector3();
            if(keys['ArrowUp']) move.z -= 1; if(keys['ArrowDown']) move.z += 1;
            if(keys['ArrowLeft']) move.x -= 1; if(keys['ArrowRight']) move.x += 1;
            move.applyQuaternion(camera.quaternion); move.y = 0;
            camera.position.add(move.normalize().multiplyScalar(speed));

            if(keys['Space']) shoot();

            zombies.forEach((z, zi) => {
                const dist = z.position.distanceTo(camera.position);
                const dir = new THREE.Vector3().subVectors(camera.position, z.position).normalize();
                z.position.add(dir.multiplyScalar(z.userData.speed));
                z.rotation.y = Math.atan2(dir.x, dir.z);
                
                if(dist < 1.6) hp -= 0.4;

                bullets.forEach((bi_bullet, bi) => {
                    if(bi_bullet.position.distanceTo(z.position) < 1.6) {
                        z.userData.hp--;
                        scene.remove(bi_bullet); bullets.splice(bi, 1);
                        if(z.userData.hp <= 0) {
                            score += 100; scene.remove(z); zombies.splice(zi,1);
                            setTimeout(spawnZombie, 4000); // 新しい敵が出るまでの時間を少し長く
                        }
                    }
                });
            });

            bullets.forEach((b, i) => { b.position.add(b.userData.vel); if(b.position.distanceTo(camera.position)>120){scene.remove(b); bullets.splice(i,1);} });

            document.getElementById('hp-bar').style.width = hp + "%";
            document.getElementById('stamina-bar').style.width = stamina + "%";
            document.getElementById('ammo-cur').innerText = currentWp.name + ": " + (currentWp.ammo === Infinity ? "∞" : currentWp.ammo);
            document.getElementById('score').innerText = score;
            
            const mctx = document.getElementById('minimap').getContext('2d');
            mctx.clearRect(0,0,160,160);
            mctx.fillStyle="blue"; mctx.fillRect(80+(camera.position.x/400)*160, 80+(camera.position.z/400)*160, 6, 6);
            mctx.fillStyle="red"; zombies.forEach(z => mctx.fillRect(80+(z.position.x/400)*160, 80+(z.position.z/400)*160, 4, 4));

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Wide Stage Smash</title>
    <style>
        body { margin: 0; background: #1a1a2e; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        canvas { background: #16213e; border: 4px solid #48dbfb; image-rendering: pixelated; width: 900px; height: 600px; }
        .ui { display: flex; gap: 50px; font-size: 30px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<canvas id="game"></canvas>
<div class="ui">
    <div style="color:#ff7675">P1: <span id="p-dmg">0</span>%</div>
    <div style="color:#55efc4">CPU: <span id="cpu-dmg">0</span>%</div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = 400; // ステージを広くするため横幅を拡張
canvas.height = 250;

// 設定（スピードを少し遅く、ジャンプを制御しやすく）
const G = 0.35;
const WALK = 2.2; // 3.5から2.2へ減速。制御しやすくしました。
const JUMP = -6.5; 

const keys = {};
window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;

class Char {
    constructor(x, y, color, isCPU) {
        this.x = x; this.y = y; this.w = 16; this.h = 20;
        this.dx = 0; this.dy = 0;
        this.color = color;
        this.hp = 0;
        this.jumps = 0;
        this.facing = 1;
        this.isCPU = isCPU;
        this.state = "idle";
        this.timer = 0;
    }

    update(target) {
        if (this.state === "hit") {
            this.timer--;
            if (this.timer <= 0) this.state = "idle";
        } else if (this.state === "attack") {
            this.timer--;
            this.dx *= 0.8; 
            if (this.timer <= 0) this.state = "idle";
        } else if (keys.ShiftLeft && !this.isCPU) {
            this.state = "shield";
            this.dx = 0;
        } else {
            this.state = "idle";
            if (!this.isCPU) {
                // 移動（少しゆっくりに）
                if (keys.ArrowRight) { this.dx = WALK; this.facing = 1; }
                else if (keys.ArrowLeft) { this.dx = -WALK; this.facing = -1; }
                else { this.dx = 0; }
                
                // ジャンプ
                if (keys.Space && this.jumps < 2 && !this.jumpDebounce) {
                    this.dy = JUMP; this.jumps++; this.jumpDebounce = true;
                }
                if (!keys.Space) this.jumpDebounce = false;
                
                if (keys.KeyA && this.state !== "attack") this.startAtk("normal");
                if (keys.KeyS && this.state !== "attack") this.startAtk("special");
            } else {
                this.ai(target);
            }
        }

        this.dy += G;
        this.x += this.dx;
        this.y += this.dy;

        // ステージ（足場）を大きく設定
        // x: 50 から 350 まで（幅300）の広い足場
        const platX = 50, platW = 300, platY = 180;
        if (this.dy > 0 && this.x + this.w > platX && this.x < platX + platW && this.y + this.h > platY && this.y + this.h < platY + 15) {
            this.y = platY - this.h;
            this.dy = 0;
            this.jumps = 0;
        }

        // バースト範囲もステージに合わせて拡大
        if (this.x < -100 || this.x > 500 || this.y < -100 || this.y > 350) {
            this.x = 200; this.y = 50; this.hp = 0; this.dx = 0; this.dy = 0;
            updateUI();
        }
    }

    startAtk(type) {
        this.state = "attack";
        this.timer = 15;
        if (type === "special" && keys.ArrowUp) this.dy = -8; 
    }

    ai(target) {
        let dist = target.x - this.x;
        if (Math.abs(dist) > 40) {
            this.dx = dist > 0 ? WALK * 0.6 : -WALK * 0.6;
            this.facing = dist > 0 ? 1 : -1;
        } else {
            this.dx = 0;
            if (Math.random() < 0.03) this.startAtk("normal");
        }
        if (this.y > 185) this.dy = JUMP; 
    }

    draw() {
        ctx.save();
        if (this.state === "shield") {
            ctx.fillStyle = "rgba(100, 200, 255, 0.5)";
            ctx.beginPath(); ctx.arc(this.x+this.w/2, this.y+this.h/2, 15, 0, Math.PI*2); ctx.fill();
        }
        ctx.fillStyle = this.state === "hit" ? "white" : (this.state === "attack" ? "yellow" : this.color);
        ctx.fillRect(this.x, this.y, this.w, this.h);
        ctx.fillStyle = "black";
        ctx.fillRect(this.x + (this.facing === 1 ? 10 : 2), this.y + 4, 4, 4);
        ctx.restore();
    }
}

const player = new Char(120, 50, "#ff7675", false);
const cpu = new Char(280, 50, "#55efc4", true);

function updateUI() {
    document.getElementById("p-dmg").innerText = player.hp;
    document.getElementById("cpu-dmg").innerText = cpu.hp;
}

function checkHit(a, b) {
    if (a.state === "attack" && a.timer === 10 && b.state !== "shield") {
        let ax = a.x + (a.facing === 1 ? a.w : -15);
        if (ax + 15 > b.x && ax < b.x + b.w && a.y < b.y + b.h && a.y + 15 > b.y) {
            b.hp += 8;
            b.state = "hit";
            b.timer = 20;
            b.dx = a.facing * (b.hp / 6 + 2);
            b.dy = -b.hp / 12 - 2;
            updateUI();
        }
    }
}

function loop() {
    ctx.fillStyle = "#16213e";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 足場（大きく、少し厚みを持たせました）
    ctx.fillStyle = "#48dbfb";
    ctx.fillRect(50, 180, 300, 8);
    ctx.fillStyle = "rgba(0,0,0,0.3)"; // 足場の影
    ctx.fillRect(50, 188, 300, 4);

    player.update(cpu);
    cpu.update(player);
    checkHit(player, cpu);
    checkHit(cpu, player);

    player.draw();
    cpu.draw();

    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>

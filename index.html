<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>The White Marble Mansion: Multiplied Dread</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { image-rendering: pixelated; border: 4px solid #333; width: 960px; height: 720px; box-shadow: 0 0 100px rgba(0,0,0,1); }
        #ui { position: absolute; top: 30px; color: #fff; font-family: 'Times New Roman', serif; pointer-events: none; width: 100%; text-align: center; }
        .info { font-size: 20px; text-shadow: 2px 2px #000; letter-spacing: 3px; margin-bottom: 10px; }
        #ammo-bar { width: 100px; height: 4px; background: #333; margin: 5px auto; position: relative; }
        #ammo-inner { width: 100%; height: 100%; background: #f00; transition: width 0.3s; }
        #ghost-count { font-size: 14px; color: #f00; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="info" id="key-status">KEYS FOUND: 0 / 5</div>
        <div id="ammo-bar"><div id="ammo-inner"></div></div>
        <div class="info" id="ammo-text" style="font-size: 12px;">BULLETS: 3 / 3</div>
        <div id="ghost-count">GHOSTS: 1</div>
    </div>
    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const GW = 320; const GH = 240;
canvas.width = GW; canvas.height = GH;

const TILE = 24;
const MAP_W = 50; const MAP_H = 50;

let world = [], rooms = [];
let p, onis = [], bullets = [], keysItems = [], trail = [];
let lastReloadTime = Date.now();

function drawEntity(x, y, dir, type, color = '#1a0000') {
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.ellipse(0, 2, 8, 4, 0, 0, Math.PI*2); ctx.fill();

    if (type === 'oni') {
        ctx.fillStyle = color;
        ctx.fillRect(-6, -24, 12, 24); 
        ctx.fillStyle = '#400'; ctx.fillRect(-6, -10, 12, 2);
        ctx.fillStyle = '#f00';
        let ox = (dir === 'right' ? 3 : dir === 'left' ? -3 : 0);
        ctx.fillRect(-3+ox, -20, 2, 2); ctx.fillRect(1+ox, -20, 2, 2);
    } else {
        ctx.fillStyle = '#333'; ctx.fillRect(-5, -16, 10, 14);
        ctx.fillStyle = '#111'; ctx.fillRect(-4, -4, 3, 4); ctx.fillRect(1, -4, 3, 4);
        ctx.fillStyle = '#ffdbac'; ctx.fillRect(-3, -21, 6, 6);
        ctx.fillStyle = '#221100'; ctx.fillRect(-4, -22, 8, 3);
    }
    ctx.restore();
}

class Bullet {
    constructor(x, y, dir) {
        this.x = x; this.y = y;
        this.vx = (dir === 'left' ? -5 : dir === 'right' ? 5 : 0);
        this.vy = (dir === 'up' ? -5 : dir === 'down' ? 5 : 0);
        this.life = 50;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.life--;
        onis.forEach(o => {
            let d = Math.hypot(this.x - o.x, this.y - (o.y-12));
            if (d < 15) {
                o.x += this.vx * 10; o.y += this.vy * 10;
                this.life = 0;
            }
        });
    }
    draw() {
        ctx.fillStyle = '#fff'; ctx.fillRect(this.x-1, this.y-1, 2, 2);
    }
}

function generateMansion() {
    for(let y=0; y<MAP_H; y++) world[y] = new Array(MAP_W).fill(0);
    rooms = [{x:5,y:5,w:10,h:10},{x:35,y:10,w:10,h:10},{x:10,y:35,w:10,h:10},{x:35,y:35,w:10,h:10},{x:22,y:22,w:6,h:6}];
    rooms.forEach(r => {
        for(let py=r.y; py<r.y+r.h; py++) for(let px=r.x; px<r.x+r.w; px++) world[py][px] = 1;
    });
    for(let i=0; i<rooms.length-1; i++) {
        let x = rooms[i].x+2, y = rooms[i].y+2, tx = rooms[i+1].x+2, ty = rooms[i+1].y+2;
        while(x !== tx) { world[y][x]=1; x += (x<tx?1:-1); }
        while(y !== ty) { world[y][x]=1; y += (y<ty?1:-1); }
    }
}

function spawnOni() {
    // プレイヤーから一番遠い広間に鬼を生成
    let targetRoom = rooms[Math.floor(Math.random()*rooms.length)];
    onis.push({ 
        x: targetRoom.x * TILE + 20, 
        y: targetRoom.y * TILE + 20, 
        speed: 1.1 * 1.2, 
        dir: 'down',
        color: `rgb(${Math.random()*50+20}, 0, 0)`
    });
}

function init() {
    generateMansion();
    p = { x: rooms[0].x*TILE+30, y: rooms[0].y*TILE+30, speed: 1.1, keys: 0, dir: 'down', ammo: 3 };
    onis = [];
    spawnOni(); // 最初の一体
    keysItems = rooms.slice(1).map(r => ({ x: (r.x+3)*TILE, y: (r.y+3)*TILE, collected: false }));
    bullets = [];
    trail = [];
}

function update() {
    const input = window.input || {};
    let nx = p.x, ny = p.y, moved = false;
    if (input['ArrowUp']) { ny -= p.speed; p.dir = 'up'; moved = true; }
    else if (input['ArrowDown']) { ny += p.speed; p.dir = 'down'; moved = true; }
    else if (input['ArrowLeft']) { nx -= p.speed; p.dir = 'left'; moved = true; }
    else if (input['ArrowRight']) { nx += p.speed; p.dir = 'right'; moved = true; }

    if (world[Math.floor(ny/TILE)]?.[Math.floor(nx/TILE)] === 1) {
        p.x = nx; p.y = ny;
        if(moved) { trail.push({x:p.x, y:p.y}); if(trail.length > 150) trail.shift(); }
    }

    if (input['ShiftLeft'] && p.ammo > 0) {
        bullets.push(new Bullet(p.x, p.y - 10, p.dir));
        p.ammo--; input['ShiftLeft'] = false;
    }
    if (p.ammo < 3 && Date.now() - lastReloadTime > 10000) { p.ammo++; lastReloadTime = Date.now(); }

    document.getElementById('ammo-inner').style.width = (p.ammo/3)*100 + "%";
    document.getElementById('ammo-text').innerText = `BULLETS: ${p.ammo} / 3`;
    document.getElementById('key-status').innerText = `KEYS FOUND: ${p.keys} / 5`;
    document.getElementById('ghost-count').innerText = `GHOSTS: ${onis.length}`;

    bullets.forEach((b, i) => { b.update(); if(b.life <= 0) bullets.splice(i, 1); });

    onis.forEach(oni => {
        let target = trail[0] || p;
        let ang = Math.atan2(target.y-oni.y, target.x-oni.x);
        oni.x += Math.cos(ang) * oni.speed;
        oni.y += Math.sin(ang) * oni.speed;
        oni.dir = Math.abs(Math.cos(ang)) > Math.abs(Math.sin(ang)) ? (Math.cos(ang) > 0 ? 'right' : 'left') : (Math.sin(ang) > 0 ? 'down' : 'up');
        if(Math.hypot(oni.x-p.x, oni.y-p.y) < 12) init();
    });

    keysItems.forEach(k => {
        if(!k.collected && Math.hypot(p.x-k.x, p.y-k.y) < 15) {
            k.collected = true; p.keys++;
            spawnOni(); // 鍵を取るごとに一体追加
        }
    });
}

function draw() {
    update();
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,GW,GH);
    ctx.save(); ctx.translate(GW/2-p.x, GH/2-p.y);

    for(let y=Math.floor((p.y-GH)/TILE); y<Math.ceil((p.y+GH)/TILE); y++) {
        for(let x=Math.floor((p.x-GW)/TILE); x<Math.ceil((p.x+GW)/TILE); x++) {
            let tx = x*TILE, ty = y*TILE;
            if(world[y]?.[x] === 1) {
                ctx.fillStyle = '#f0f0f0'; ctx.fillRect(tx, ty, TILE, TILE); // 白い大理石
                ctx.fillStyle = '#e0e0e0'; ctx.fillRect(tx, ty, TILE, 1); // 目地
            } else if(world[y]?.[x] === 0) {
                ctx.fillStyle = '#111'; ctx.fillRect(tx, ty, TILE, TILE);
                if(world[y+1]?.[x] === 1) {
                    ctx.fillStyle = '#222'; ctx.fillRect(tx, ty+TILE-6, TILE, 6);
                    ctx.fillStyle = '#3a2a1a'; ctx.fillRect(tx, ty+TILE-2, TILE, 2); // 巾木
                }
            }
        }
    }

    keysItems.forEach(k => { if(!k.collected) { 
        ctx.fillStyle = '#ffd700'; ctx.beginPath(); ctx.arc(k.x, k.y, 4, 0, 7); ctx.fill(); 
    }});

    bullets.forEach(b => b.draw());
    drawEntity(p.x, p.y, p.dir, 'human');
    onis.forEach(oni => drawEntity(oni.x, oni.y, oni.dir, 'oni', oni.color));

    ctx.restore();

    const grad = ctx.createRadialGradient(GW/2, GH/2, 20, GW/2, GH/2, 120);
    grad.addColorStop(0, 'rgba(255,255,255,0.05)');
    grad.addColorStop(0.5, 'rgba(0,0,0,0.5)');
    grad.addColorStop(1, 'rgba(0,0,0,1)');
    ctx.fillStyle = grad; ctx.fillRect(0,0,GW,GH);

    requestAnimationFrame(draw);
}

window.input = {};
window.onkeydown = e => window.input[e.code] = true;
window.onkeyup = e => window.input[e.code] = false;
init();
draw();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>廃ビルの鬼 - Abandoned Building</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: 'Segoe UI', sans-serif; }
        #onime { 
            position: absolute; top: 20px; right: 20px; 
            width: 300px; height: 170px; 
            border: 4px solid #222; outline: 2px solid #ff0000;
            background: #000; z-index: 100;
        }
        #ui { 
            position: absolute; top: 20px; left: 20px; color: white; 
            text-shadow: 2px 2px 4px black; pointer-events: none;
        }
        .crosshair {
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            border: 1px solid rgba(255,255,255,0.5); border-radius: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div id="ui">
        <h2>ABANDONED COMPLEX</h2>
        <p>クリックして開始 | WASD: 移動 | マウス: 視点操作</p>
        <p id="dist">DISTANCE: --</p>
    </div>
    <div id="onime"></div>
    <div class="crosshair"></div>

<script type="importmap">
{
    "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" }
}
</script>

<script type="module">
import * as THREE from 'three';

// --- 初期設定 ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xd0d0d0); // 明るい昼間の廃ビル
scene.fog = new THREE.Fog(0xd0d0d0, 10, 80);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const oniRenderer = new THREE.WebGLRenderer({ antialias: true });
oniRenderer.setSize(300, 170);
document.getElementById('onime').appendChild(oniRenderer.domElement);

// --- カメラ & 操作系 ---
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const oniCamera = new THREE.PerspectiveCamera(70, 300 / 170, 0.1, 100);

let yaw = 0, pitch = 0;
document.addEventListener('click', () => document.body.requestPointerLock());
document.addEventListener('mousemove', (e) => {
    if (document.pointerLockElement === document.body) {
        yaw -= e.movementX * 0.002;
        pitch -= e.movementY * 0.002;
        pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
    }
});

// --- 廃ビルの建築 ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
sunLight.position.set(50, 100, 50);
sunLight.castShadow = true;
sunLight.shadow.camera.left = -50;
sunLight.shadow.camera.right = 50;
sunLight.shadow.camera.top = 50;
sunLight.shadow.camera.bottom = -50;
scene.add(sunLight);

// 床（巨大なコンクリートフロア）
const floorGeo = new THREE.PlaneGeometry(200, 200);
const floorMat = new THREE.MeshStandardMaterial({ color: 0xbcbcbc, roughness: 0.4 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// 壁・柱（廃ビル風）
function createStructure(x, z, w, h, d) {
    const geo = new THREE.BoxGeometry(w, h, d);
    const mat = new THREE.MeshStandardMaterial({ color: 0x444444 }); // 濃い灰色
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, h/2, z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    scene.add(mesh);
}

// 大きな部屋と回廊を作る
for(let i=0; i<8; i++) {
    createStructure(Math.cos(i)*25, Math.sin(i)*25, 4, 15, 4); // 巨大な柱
}
createStructure(0, -30, 60, 20, 2); // 奥の大きな壁
createStructure(20, 10, 2, 10, 15); // 横の仕切り

// プレイヤー（カメラ位置）
const playerPos = new THREE.Vector3(0, 1.7, 10);
const playerObj = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1, 4, 8), new THREE.MeshStandardMaterial({color: 0x222222}));
scene.add(playerObj);

// 鬼（不気味な黒い実体）
const oni = new THREE.Mesh(new THREE.BoxGeometry(1.5, 3, 1.5), new THREE.MeshStandardMaterial({color: 0x000000}));
scene.add(oni);

// --- メインループ ---
const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

let time = 0;
function animate() {
    requestAnimationFrame(animate);
    time += 0.01;

    // 移動処理
    const moveSpeed = 0.15;
    const direction = new THREE.Vector3();
    if (keys['KeyW']) direction.z -= 1;
    if (keys['KeyS']) direction.z += 1;
    if (keys['KeyA']) direction.x -= 1;
    if (keys['KeyD']) direction.x += 1;
    direction.applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
    playerPos.add(direction.normalize().multiplyScalar(moveSpeed));
    playerObj.position.copy(playerPos);

    // メインカメラ更新
    camera.position.copy(playerPos);
    camera.rotation.order = 'YXZ';
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;

    // 鬼の知能（廃ビルを徘徊）
    oni.position.x = Math.sin(time * 0.3) * 20;
    oni.position.z = Math.cos(time * 0.5) * 20;
    oni.position.y = 1.5;
    oni.lookAt(playerPos);

    // 鬼の視界（右上）
    oniCamera.position.copy(oni.position);
    oniCamera.position.y = 2.5;
    oniCamera.lookAt(playerPos);

    // UI更新
    const d = playerPos.distanceTo(oni.position);
    document.getElementById('dist').innerText = `DISTANCE: ${d.toFixed(1)}m`;

    renderer.render(scene, camera);
    oniRenderer.render(scene, oniCamera);
}

animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Pixel Smash - Fixed</title>
    <style>
        body { margin: 0; background: #1a1a2e; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        canvas { background: #16213e; border: 4px solid #48dbfb; image-rendering: pixelated; width: 800px; height: 533px; }
        .ui { display: flex; gap: 50px; font-size: 30px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<canvas id="game"></canvas>
<div class="ui">
    <div style="color:#ff7675">P1: <span id="p-dmg">0</span>%</div>
    <div style="color:#55efc4">CPU: <span id="cpu-dmg">0</span>%</div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = 300; // 低解像度でドット感を出す
canvas.height = 200;

// 設定
const G = 0.4;
const WALK = 3.5;
const JUMP = -7;

const keys = {};
window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;

class Char {
    constructor(x, y, color, isCPU) {
        this.x = x; this.y = y; this.w = 16; this.h = 20;
        this.dx = 0; this.dy = 0;
        this.color = color;
        this.hp = 0;
        this.jumps = 0;
        this.facing = 1;
        this.isCPU = isCPU;
        this.state = "idle"; // idle, attack, hit, shield
        this.timer = 0;
    }

    update(target) {
        // --- 行動処理 ---
        if (this.state === "hit") {
            this.timer--;
            if (this.timer <= 0) this.state = "idle";
        } else if (this.state === "attack") {
            this.timer--;
            this.dx *= 0.5; // 攻撃中は少し減速
            if (this.timer <= 0) this.state = "idle";
        } else if (keys.ShiftLeft && !this.isCPU) {
            this.state = "shield";
            this.dx = 0;
        } else {
            this.state = "idle";
            if (!this.isCPU) {
                if (keys.ArrowRight) { this.dx = WALK; this.facing = 1; }
                else if (keys.ArrowLeft) { this.dx = -WALK; this.facing = -1; }
                else { this.dx = 0; }
                if (keys.Space && this.jumps < 2 && !this.jumpDebounce) {
                    this.dy = JUMP; this.jumps++; this.jumpDebounce = true;
                }
                if (!keys.Space) this.jumpDebounce = false;
                
                // Aボタン攻撃 / Sボタン必殺技
                if (keys.KeyA && this.state !== "attack") this.startAtk("normal");
                if (keys.KeyS && this.state !== "attack") this.startAtk("special");
            } else {
                this.ai(target);
            }
        }

        // 物理
        this.dy += G;
        this.x += this.dx;
        this.y += this.dy;

        // 地面判定
        if (this.dy > 0 && this.x + this.w > 80 && this.x < 220 && this.y + this.h > 150 && this.y + this.h < 165) {
            this.y = 150 - this.h;
            this.dy = 0;
            this.jumps = 0;
        }

        // 画面外リセット
        if (this.x < -50 || this.x > 350 || this.y < -50 || this.y > 250) {
            this.x = 150; this.y = 50; this.hp = 0; this.dx = 0; this.dy = 0;
            updateUI();
        }
    }

    startAtk(type) {
        this.state = "attack";
        this.timer = 15;
        if (type === "special" && keys.ArrowUp) this.dy = -9; // 上B復帰
    }

    ai(target) {
        let dist = target.x - this.x;
        if (Math.abs(dist) > 30) {
            this.dx = dist > 0 ? 2 : -2;
            this.facing = dist > 0 ? 1 : -1;
        } else {
            this.dx = 0;
            if (Math.random() < 0.05) this.startAtk("normal");
        }
        if (this.y > 155) this.dy = JUMP; // 崖下ならジャンプ
    }

    draw() {
        ctx.save();
        // シールド
        if (this.state === "shield") {
            ctx.fillStyle = "rgba(100, 200, 255, 0.5)";
            ctx.beginPath(); ctx.arc(this.x+this.w/2, this.y+this.h/2, 15, 0, Math.PI*2); ctx.fill();
        }
        // 本体
        ctx.fillStyle = this.state === "hit" ? "white" : (this.state === "attack" ? "yellow" : this.color);
        ctx.fillRect(this.x, this.y, this.w, this.h);
        // 目
        ctx.fillStyle = "black";
        ctx.fillRect(this.x + (this.facing === 1 ? 10 : 2), this.y + 4, 4, 4);
        ctx.restore();
    }
}

const player = new Char(110, 50, "#ff7675", false);
const cpu = new Char(170, 50, "#55efc4", true);

function updateUI() {
    document.getElementById("p-dmg").innerText = player.hp;
    document.getElementById("cpu-dmg").innerText = cpu.hp;
}

function checkHit(a, b) {
    if (a.state === "attack" && a.timer === 10 && b.state !== "shield") {
        let ax = a.x + (a.facing === 1 ? a.w : -15);
        if (ax + 15 > b.x && ax < b.x + b.w && a.y < b.y + b.h && a.y + 15 > b.y) {
            b.hp += 10;
            b.state = "hit";
            b.timer = 20;
            b.dx = a.facing * (b.hp / 5 + 2);
            b.dy = -b.hp / 10 - 2;
            updateUI();
        }
    }
}

function loop() {
    // 背景塗りつぶし（ここが真っ黒防止のキモ）
    ctx.fillStyle = "#16213e";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 足場
    ctx.fillStyle = "#48dbfb";
    ctx.fillRect(80, 150, 140, 5);

    player.update(cpu);
    cpu.update(player);
    checkHit(player, cpu);
    checkHit(cpu, player);

    player.draw();
    cpu.draw();

    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>

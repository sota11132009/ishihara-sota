<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Exorcist: Mansion Escape</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { image-rendering: pixelated; border: 4px solid #1a1a1a; width: 960px; height: 720px; }
        #ui { position: absolute; top: 20px; color: #fff; font-family: 'serif'; pointer-events: none; text-align: center; width: 100%; }
        .info { font-size: 18px; text-shadow: 2px 2px #000; margin-bottom: 5px; }
        #ammo-ui { color: #f00; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="info" id="key-status">KEYS: 0 / 5</div>
        <div class="info" id="ammo-ui">AMMO: 3 / 3 (READY)</div>
    </div>
    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const GW = 320; const GH = 240;
canvas.width = GW; canvas.height = GH;

const TILE = 24;
const MAP_W = 60; const MAP_H = 60;

let world = [], rooms = [];
let p, onis = [], bullets = [], keysItems = [], trail = [];
let lastReloadTime = Date.now();

// --- 1. キャラクター描画関数 (本格ドット) ---
function drawHuman(x, y, dir, isGhost = false, color = '#2c3e50') {
    ctx.save();
    ctx.translate(x, y);
    
    // 影
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(-6, 2, 12, 4);

    if (isGhost) {
        // 鬼（幽霊）の描画
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(-7, 4); ctx.lineTo(-7, -14);
        ctx.quadraticCurveTo(0, -22, 7, -14); ctx.lineTo(7, 4);
        ctx.fill();
        // 裾のギザギザ
        for(let i=0; i<3; i++) {
            ctx.beginPath();
            ctx.arc(-4 + i*4, 4, 3, 0, Math.PI);
            ctx.fill();
        }
        // 顔（向きに合わせて目が動く）
        ctx.fillStyle = '#fff';
        let ox = (dir === 'right' ? 2 : dir === 'left' ? -2 : 0);
        let oy = (dir === 'down' ? 2 : dir === 'up' ? -2 : 0);
        ctx.fillRect(-4+ox, -14+oy, 2, 2); ctx.fillRect(2+ox, -14+oy, 2, 2);
    } else {
        // 人間の描画
        // 体
        ctx.fillStyle = color;
        ctx.fillRect(-5, -14, 10, 14);
        // 頭
        ctx.fillStyle = '#ffdbac';
        ctx.fillRect(-3, -18, 6, 6);
        // 髪/帽子
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(-4, -19, 8, 3);
        // 向いている方向へのディテール
        ctx.fillStyle = '#000';
        if(dir === 'right') ctx.fillRect(2, -15, 2, 2);
        if(dir === 'left')  ctx.fillRect(-4, -15, 2, 2);
        if(dir === 'down')  { ctx.fillRect(-2, -15, 1, 2); ctx.fillRect(1, -15, 1, 2); }
    }
    ctx.restore();
}

// --- 2. 銃弾クラス ---
class Bullet {
    constructor(x, y, dir) {
        this.x = x; this.y = y;
        this.vx = (dir === 'left' ? -4 : dir === 'right' ? 4 : 0);
        this.vy = (dir === 'up' ? -4 : dir === 'down' ? 4 : 0);
        this.life = 40;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.life--;
        // 鬼との衝突判定
        onis.forEach(o => {
            if (Math.hypot(this.x - o.x, this.y - o.y) < 15) {
                o.x += this.vx * 5; o.y += this.vy * 5; // 強力ノックバック
                this.life = 0;
            }
        });
    }
    draw() {
        ctx.fillStyle = '#ff0';
        ctx.fillRect(this.x-1, this.y-1, 3, 3);
    }
}

// --- 3. マップ生成 & 初期化 ---
function generateMansion() {
    for(let y=0; y<MAP_H; y++) world[y] = new Array(MAP_W).fill(0);
    rooms = [{x:5,y:5,w:8,h:8},{x:45,y:10,w:10,h:7},{x:10,y:40,w:7,h:12},{x:40,y:45,w:12,h:10},{x:25,y:25,w:6,h:6}];
    rooms.forEach(r => {
        for(let py=r.y; py<r.y+r.h; py++) for(let px=r.x; px<r.x+r.w; px++) world[py][px] = 1;
    });
    for(let i=0; i<rooms.length-1; i++) {
        let x = rooms[i].x+2, y = rooms[i].y+2, tx = rooms[i+1].x+2, ty = rooms[i+1].y+2;
        while(x !== tx) { world[y][x]=1; x += (x<tx?1:-1); }
        while(y !== ty) { world[y][x]=1; y += (y<ty?1:-1); }
    }
}

function init() {
    generateMansion();
    p = { x: rooms[0].x*TILE+30, y: rooms[0].y*TILE+30, speed: 1.0, keys: 0, dir: 'down', ammo: 3 };
    onis = [
        { x: rooms[1].x*TILE+20, y: rooms[1].y*TILE+20, speed: 0.7, dir: 'down', color: '#600' },
        { x: rooms[2].x*TILE+20, y: rooms[2].y*TILE+20, speed: 0.7, dir: 'down', color: '#404' }
    ];
    keysItems = rooms.slice(1).map(r => ({ x: (r.x+2)*TILE, y: (r.y+2)*TILE, collected: false }));
    bullets = [];
}

// --- 4. メインループ ---
function update() {
    const input = window.input || {};
    let nx = p.x, ny = p.y;
    let moved = false;

    if (input['ArrowUp'])    { ny -= p.speed; p.dir = 'up'; moved = true; }
    else if (input['ArrowDown'])  { ny += p.speed; p.dir = 'down'; moved = true; }
    else if (input['ArrowLeft'])  { nx -= p.speed; p.dir = 'left'; moved = true; }
    else if (input['ArrowRight']) { nx += p.speed; p.dir = 'right'; moved = true; }

    if (world[Math.floor(ny/TILE)]?.[Math.floor(nx/TILE)] === 1) {
        p.x = nx; p.y = ny;
        if(moved) { trail.push({x:p.x, y:p.y}); if(trail.length > 100) trail.shift(); }
    }

    // 銃を撃つ (Shift)
    if (input['ShiftLeft'] && p.ammo > 0) {
        bullets.push(new Bullet(p.x, p.y - 10, p.dir));
        p.ammo--;
        input['ShiftLeft'] = false; // 押しっぱなし防止
    }

    // リロード処理 (10秒 = 10000ms)
    if (p.ammo < 3 && Date.now() - lastReloadTime > 10000) {
        p.ammo++;
        lastReloadTime = Date.now();
    }

    // UI更新
    document.getElementById('ammo-ui').innerText = `AMMO: ${p.ammo} / 3 ${p.ammo < 3 ? `(Reloading...)` : '(READY)'}`;
    document.getElementById('key-status').innerText = `KEYS: ${p.keys} / 5`;

    bullets.forEach((b, i) => { b.update(); if(b.life <= 0) bullets.splice(i, 1); });

    onis.forEach(o => {
        let d = Math.hypot(o.x-p.x, o.y-p.y);
        let target = trail[Math.max(0, trail.length - 40)] || p;
        let ang = Math.atan2(target.y-o.y, target.x-o.x);
        o.x += Math.cos(ang) * o.speed;
        o.y += Math.sin(ang) * o.speed;
        
        // 鬼の向きを決定
        if (Math.abs(Math.cos(ang)) > Math.abs(Math.sin(ang))) o.dir = Math.cos(ang) > 0 ? 'right' : 'left';
        else o.dir = Math.sin(ang) > 0 ? 'down' : 'up';

        if(d < 12) init(); 
    });

    keysItems.forEach(k => {
        if(!k.collected && Math.hypot(p.x-k.x, p.y-k.y) < 15) { k.collected = true; p.keys++; }
    });
}

function draw() {
    update();
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,GW,GH);
    ctx.save();
    ctx.translate(GW/2-p.x, GH/2-p.y);

    // タイル描画
    for(let y=Math.floor((p.y-GH)/TILE); y<Math.ceil((p.y+GH)/TILE); y++) {
        for(let x=Math.floor((p.x-GW)/TILE); x<Math.ceil((p.x+GW)/TILE); x++) {
            if(world[y]?.[x] === 1) {
                ctx.fillStyle = '#1a1818'; ctx.fillRect(x*TILE, y*TILE, TILE, TILE);
            } else if(world[y]?.[x] === 0) {
                ctx.fillStyle = '#050505'; ctx.fillRect(x*TILE, y*TILE, TILE, TILE);
                if(world[y+1]?.[x] === 1) { ctx.fillStyle = '#111'; ctx.fillRect(x*TILE, y*TILE+TILE-4, TILE, 4); }
            }
        }
    }

    keysItems.forEach(k => { if(!k.collected) { ctx.fillStyle = '#ffd700'; ctx.fillRect(k.x-2, k.y-4, 4, 8); }});
    bullets.forEach(b => b.draw());
    
    drawHuman(p.x, p.y, p.dir, false, '#2c3e50');
    onis.forEach(o => drawHuman(o.x, o.y, o.dir, true, o.color));

    ctx.restore();

    // 懐中電灯
    const grad = ctx.createRadialGradient(GW/2, GH/2, 10, GW/2, GH/2, 110);
    grad.addColorStop(0, 'transparent'); grad.addColorStop(1, 'rgba(0,0,0,0.9)');
    ctx.fillStyle = grad; ctx.fillRect(0,0,GW,GH);

    requestAnimationFrame(draw);
}

window.input = {};
window.onkeydown = e => window.input[e.code] = true;
window.onkeyup = e => window.input[e.code] = false;

init();
draw();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ZOMBIE CITY SURVIVAL - FINAL</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; pointer-events: none; z-index: 10; }
        .bar-container { width: 200px; height: 12px; background: rgba(255,255,255,0.2); margin-bottom: 5px; border: 1px solid #fff; }
        #hp-bar { width: 100%; height: 100%; background: #f00; transition: width 0.3s; }
        #stamina-bar { width: 100%; height: 100%; background: #0f0; transition: width 0.1s; }
        #ammo-ui { font-size: 24px; color: #0ff; margin-top: 10px; text-shadow: 2px 2px 4px #000; }
        #minimap { position: absolute; top: 20px; right: 20px; border: 2px solid #fff; background: rgba(0,0,0,0.5); z-index: 10; }
        #danger-indicator { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; transition: box-shadow 0.2s; z-index: 5; }
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(100,0,0,0.7); display: none; flex-direction: column;
            justify-content: center; align-items: center; color: white; z-index: 100;
        }
        button { padding: 15px 40px; font-size: 24px; background: #f00; color: #fff; border: none; cursor: pointer; border-radius: 5px; }
        #msg { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #fff; background: rgba(0,0,0,0.5); padding: 5px; }
    </style>
</head>
<body>
    <div id="danger-indicator"></div>
    <div id="ui">
        HP <div class="bar-container"><div id="hp-bar"></div></div>
        STAMINA <div class="bar-container"><div id="stamina-bar"></div></div>
        <div id="ammo-ui"><span id="wp-name">Handgun</span>: <span id="ammo-cur">∞</span> / <span id="ammo-res">--</span></div>
        SCORE: <span id="score">0</span> | AREA: <span id="area-name">Slums</span>
    </div>
    <div id="minimap-container"><canvas id="minimap" width="150" height="150"></canvas></div>
    <div id="overlay">
        <h1>YOU DIED</h1>
        <button onclick="location.reload()">RETRY</button>
    </div>
    <div id="msg">クリックして開始 | [矢印キー]:移動 | [SPACE]:射撃 | [ENTER]:武器変更 | [CTRL]:リロード | [SHIFT]:ダッシュ</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- 1. 基本設定 ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 1, 45);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const flashlight = new THREE.SpotLight(0xffffff, 3.5, 40, Math.PI/6, 0.5, 1);
        flashlight.castShadow = true;
        scene.add(flashlight);
        scene.add(flashlight.target);
        scene.add(new THREE.AmbientLight(0x050505));

        // --- 2. プロシージャル街生成 ---
        const MAP_SIZE = 400;
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE), new THREE.MeshPhongMaterial({color: 0x111111}));
        floor.rotation.x = -Math.PI/2; floor.receiveShadow = true;
        scene.add(floor);

        for(let i=0; i<80; i++) {
            let x = (Math.random()-0.5)*MAP_SIZE, z = (Math.random()-0.5)*MAP_SIZE;
            if(Math.abs(x) > 10 || Math.abs(z) > 10) {
                const h = 10 + Math.random() * 20;
                const b = new THREE.Mesh(new THREE.BoxGeometry(10, h, 10), new THREE.MeshPhongMaterial({color: 0x1a1a2e}));
                b.position.set(x, h/2, z); b.castShadow = true; b.receiveShadow = true;
                scene.add(b);
            }
        }

        // --- 3. ゲームデータ ---
        let hp = 100, stamina = 100, score = 0, isDead = false;
        const zombies = [], bullets = [], items = [], keys = {};
        const weapons = {
            1: { name: "Handgun", ammo: Infinity, res: Infinity, cooldown: 400, spread: 0, count: 1, speed: 1.5 },
            2: { name: "Shotgun", ammo: 8, res: 24, cooldown: 800, spread: 0.15, count: 6, speed: 1.2 },
            3: { name: "SMG", ammo: 30, res: 90, cooldown: 100, spread: 0.05, count: 1, speed: 1.8 }
        };
        let wpIdx = 1;
        let currentWp = weapons[wpIdx];
        let lastShot = 0, isReloading = false;

        // --- 4. 生成システム ---
        function spawnZombie() {
            const group = new THREE.Group();
            const type = Math.random();
            let config = { hp: 3, speed: 0.05, color: 0x113311, scale: 1 };
            if(type > 0.8) config = { hp: 7, speed: 0.02, color: 0x441111, scale: 1.6 }; // Tank
            if(type < 0.2) config = { hp: 1, speed: 0.1, color: 0x111144, scale: 0.8 };  // Runner

            const body = new THREE.Mesh(new THREE.BoxGeometry(0.6*config.scale, 1.2*config.scale, 0.4*config.scale), new THREE.MeshPhongMaterial({color: config.color}));
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.4*config.scale, 0.4*config.scale, 0.4*config.scale), new THREE.MeshPhongMaterial({color: config.color}));
            head.position.y = 0.8 * config.scale;
            group.add(body); group.add(head);
            const ang = Math.random()*Math.PI*2;
            group.position.set(camera.position.x + Math.cos(ang)*35, 0.6*config.scale, camera.position.z + Math.sin(ang)*35);
            group.userData = { ...config, flash: 0 };
            scene.add(group); zombies.push(group);
        }

        function spawnItem(type) {
            const item = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.4, 0.6), new THREE.MeshPhongMaterial({color: type==='ammo'?0x0088ff:0x00ff44}));
            item.position.set((Math.random()-0.5)*180, 0.2, (Math.random()-0.5)*180);
            item.userData = { type };
            scene.add(item); items.push(item);
        }

        for(let i=0; i<15; i++) spawnZombie();
        for(let i=0; i<8; i++) { spawnItem('ammo'); spawnItem('hp'); }

        // --- 5. 入力 & アクション ---
        window.addEventListener('keydown', e => { 
            keys[e.code] = true;
            if(e.code === 'Enter') { // 武器切り替え
                wpIdx = (wpIdx % 3) + 1;
                currentWp = weapons[wpIdx];
                isReloading = false;
            }
            if(e.code === 'ControlLeft' || e.code === 'ControlRight') reload();
        });
        window.addEventListener('keyup', e => keys[e.code] = false);
        document.body.addEventListener('click', () => { if(!isDead) document.body.requestPointerLock(); });

        function shoot() {
            const now = Date.now();
            if(isReloading || now - lastShot < currentWp.cooldown || currentWp.ammo === 0) return;
            lastShot = now;
            if(currentWp.ammo !== Infinity) currentWp.ammo--;

            for(let i=0; i<currentWp.count; i++) {
                const b = new THREE.Mesh(new THREE.SphereGeometry(0.06), new THREE.MeshBasicMaterial({color: 0xffff00}));
                b.position.copy(camera.position);
                const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                dir.x += (Math.random()-0.5)*currentWp.spread;
                dir.y += (Math.random()-0.5)*currentWp.spread;
                b.userData.vel = dir.normalize().multiplyScalar(currentWp.speed);
                scene.add(b); bullets.push(b);
            }
        }

        function reload() {
            if(isReloading || currentWp.ammo === Infinity || currentWp.res <= 0) return;
            isReloading = true;
            setTimeout(() => {
                const max = (currentWp.name==="Shotgun"?8:30);
                const need = max - currentWp.ammo;
                const take = Math.min(need, currentWp.res);
                currentWp.ammo += take; currentWp.res -= take;
                isReloading = false;
            }, 1000);
        }

        // --- 6. メインループ ---
        let yaw = 0, pitch = 0;
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                yaw -= e.movementX * 0.002; pitch -= e.movementY * 0.002;
                pitch = Math.max(-1.5, Math.min(1.5, pitch));
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            if(isDead) return;
            if(hp <= 0) { isDead = true; document.getElementById('overlay').style.display = 'flex'; document.exitPointerLock(); return; }

            // 移動 (矢印キー)
            let speed = keys['ShiftLeft'] && stamina > 0 ? 0.25 : 0.13;
            if(keys['ShiftLeft'] && stamina > 0) stamina -= 0.7; else stamina = Math.min(100, stamina + 0.4);
            const move = new THREE.Vector3();
            if(keys['ArrowUp']) move.z -= 1; if(keys['ArrowDown']) move.z += 1;
            if(keys['ArrowLeft']) move.x -= 1; if(keys['ArrowRight']) move.x += 1;
            move.applyQuaternion(camera.quaternion); move.y = 0;
            camera.position.add(move.normalize().multiplyScalar(speed));

            // 射撃判定 (Space長押し)
            if(keys['Space']) shoot();

            flashlight.position.copy(camera.position);
            flashlight.target.position.copy(camera.position).add(new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion));

            // 更新ロジック
            let danger = 0;
            zombies.forEach((z, zi) => {
                const d = z.position.distanceTo(camera.position);
                const dir = new THREE.Vector3().subVectors(camera.position, z.position).normalize();
                z.position.add(dir.multiplyScalar(z.userData.speed));
                z.rotation.y = Math.atan2(dir.x, dir.z);
                if(d < 1.3) hp -= 0.5;
                if(d < 12) danger = Math.max(danger, (12-d)/12);
                
                bullets.forEach((b, bi) => {
                    if(b.position.distanceTo(z.position) < 1.2) {
                        z.userData.hp--; z.userData.flash = 5;
                        scene.remove(b); bullets.splice(bi, 1);
                        if(z.userData.hp <= 0) { score += 150; scene.remove(z); zombies.splice(zi,1); spawnZombie(); }
                    }
                });
                z.children.forEach(c => c.material.emissive.setHex(z.userData.flash-- > 0 ? 0xff0000 : 0x000000));
            });

            items.forEach((item, i) => {
                if(item.position.distanceTo(camera.position) < 1.5) {
                    if(item.userData.type === 'ammo') { weapons[2].res += 16; weapons[3].res += 30; }
                    else hp = Math.min(100, hp + 50);
                    scene.remove(item); items.splice(i, 1);
                    setTimeout(() => spawnItem(item.userData.type), 15000);
                }
            });

            bullets.forEach((b, i) => { b.position.add(b.userData.vel); if(b.position.distanceTo(camera.position)>60){scene.remove(b); bullets.splice(i,1);} });

            // UI & ミニマップ
            document.getElementById('hp-bar').style.width = hp + "%";
            document.getElementById('stamina-bar').style.width = stamina + "%";
            document.getElementById('ammo-cur').innerText = currentWp.ammo === Infinity ? "∞" : currentWp.ammo;
            document.getElementById('ammo-res').innerText = currentWp.res === Infinity ? "--" : currentWp.res;
            document.getElementById('wp-name').innerText = isReloading ? "RELOADING" : currentWp.name;
            document.getElementById('score').innerText = score;
            document.getElementById('danger-indicator').style.boxShadow = `inset 0 0 ${danger*120}px rgba(255,0,0,${danger})`;
            
            const mctx = document.getElementById('minimap').getContext('2d');
            mctx.clearRect(0,0,150,150);
            mctx.fillStyle="white"; mctx.fillRect(75+(camera.position.x/MAP_SIZE)*150, 75+(camera.position.z/MAP_SIZE)*150, 4, 4);
            mctx.fillStyle="red"; zombies.forEach(z => mctx.fillRect(75+(z.position.x/MAP_SIZE)*150, 75+(z.position.z/MAP_SIZE)*150, 2, 2));

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>

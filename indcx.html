<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Dot Horror Prop Hunt</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { 
            image-rendering: pixelated; /* ドットをくっきりさせる */
            border: 4px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,1);
            width: 800px; height: 600px; 
        }
        #ui { position: absolute; color: #fff; font-family: 'Courier New', Courier, monospace; pointer-events: none; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>
    <div id="ui"></div>
    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// 低解像度で描画して拡大する（ドット感を出す）
const GAME_W = 320;
const GAME_H = 240;
canvas.width = GAME_W;
canvas.height = GAME_H;

const TILE_SIZE = 16;

// プレイヤー
const player = {
    x: 50, y: 50, w: 12, h: 16,
    speed: 1.5,
    isProp: false,
    propType: null,
    heartbeat: 0
};

// 鬼 (Oni)
const oni = {
    x: 280, y: 200, w: 16, h: 22,
    speed: 0.8,
    state: 'search',
    target: { x: 50, y: 50 },
    timer: 0
};

// 家具（擬態対象）
const props = [
    { x: 80, y: 60, w: 16, h: 16, color: '#5d4037', type: 'chair' },
    { x: 200, y: 150, w: 24, h: 16, color: '#4e342e', type: 'desk' },
    { x: 40, y: 180, w: 12, h: 20, color: '#3e2723', type: 'vase' },
    { x: 250, y: 40, w: 20, h: 24, color: '#5d4037', type: 'shelf' }
];

const keys = {};
window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;

function update() {
    // 擬態切り替え
    if (keys['Space']) {
        const near = props.find(p => Math.hypot(player.x - p.x, player.y - p.y) < 25);
        if (near && !player.isProp) {
            player.isProp = true;
            player.propType = near;
            player.x = near.x; player.y = near.y;
        } else {
            player.isProp = false;
        }
        keys['Space'] = false;
    }

    // 移動
    if (!player.isProp) {
        if (keys['ArrowUp']) player.y -= player.speed;
        if (keys['ArrowDown']) player.y += player.speed;
        if (keys['ArrowLeft']) player.x -= player.speed;
        if (keys['ArrowRight']) player.x += player.speed;
    }

    // 鬼のAI：擬態していないプレイヤーを見つけると追跡
    const dist = Math.hypot(oni.x - player.x, oni.y - player.y);
    
    if (!player.isProp && dist < 100) {
        oni.state = 'chase';
    } else if (dist > 150) {
        oni.state = 'search';
    }

    if (oni.state === 'chase') {
        oni.x += (player.x - oni.x) * 0.03;
        oni.y += (player.y - oni.y) * 0.03;
        oni.speed = 1.2;
    } else {
        // パトロール
        oni.speed = 0.5;
        oni.x += (oni.target.x - oni.x) * 0.01;
        oni.y += (oni.target.y - oni.y) * 0.01;
        if (Math.hypot(oni.x - oni.target.x, oni.y - oni.target.y) < 5) {
            oni.target = { x: Math.random() * GAME_W, y: Math.random() * GAME_H };
        }
    }

    // 心音エフェクト
    if (dist < 80) player.heartbeat += (80 - dist) * 0.01;
}

function draw() {
    // 背景（畳や古い床をイメージした暗い色）
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, GAME_W, GAME_H);

    // グリッド線（うっすら）
    ctx.strokeStyle = '#222';
    for(let i=0; i<GAME_W; i+=TILE_SIZE) ctx.strokeRect(i, 0, 1, GAME_H);

    // 家具
    props.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.w, p.h);
        // ドットのハイライト
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.fillRect(p.x, p.y, p.w, 2);
    });

    // プレイヤー
    if (player.isProp) {
        ctx.fillStyle = player.propType.color;
        ctx.fillRect(player.x, player.y, player.propType.w, player.propType.h);
        // 緊張による小刻みな震え
        if (Math.sin(Date.now()*0.02) > 0.8 && Math.hypot(oni.x-player.x, oni.y-player.y) < 50) {
            player.x += Math.sin(Date.now());
        }
    } else {
        ctx.fillStyle = '#3498db'; // 青い服の男
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.fillStyle = '#f3e5ab'; // 肌色
        ctx.fillRect(player.x + 2, player.y + 2, 8, 4);
    }

    // 鬼 (Oni) - 青鬼風の配色
    ctx.fillStyle = '#2e3192'; 
    ctx.fillRect(oni.x, oni.y, oni.w, oni.h);
    ctx.fillStyle = '#fff'; // 目
    ctx.fillRect(oni.x+2, oni.y+4, 4, 4);
    ctx.fillRect(oni.x+10, oni.y+4, 4, 4);
    ctx.fillStyle = '#000'; // 瞳
    ctx.fillRect(oni.x+3, oni.y+5, 2, 2);
    ctx.fillRect(oni.x+11, oni.y+5, 2, 2);

    // 暗闇（ビネット効果）
    const grad = ctx.createRadialGradient(player.x, player.y, 20, player.x, player.y, 120);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(0,0,0,0.95)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, GAME_W, GAME_H);

    // 画面の揺れ（心音と連動）
    if (player.heartbeat > 1) {
        const shift = Math.sin(Date.now() * 0.01) * 2;
        canvas.style.transform = `translate(${shift}px, 0)`;
    }

    requestAnimationFrame(() => {
        update();
        draw();
    });
}

draw();
</script>
</body>
</html>

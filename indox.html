<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Simple Smash Prototype</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #222; color: white; font-family: sans-serif; }
        canvas { background-color: #333; border: 4px solid #555; image-rendering: pixelated; }
        #ui { position: absolute; bottom: 20px; font-size: 24px; font-weight: bold; text-align: center; width: 100%; pointer-events: none; }
    </style>
</head>
<body>

<div id="ui">Player: <span id="damage">0</span>%</div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const damageDisplay = document.getElementById("damage");

canvas.width = 600;
canvas.height = 400;

// 定数
const GRAVITY = 0.5;
const FRICTION = 0.8; // 地摩擦

// プレイヤーオブジェクト
const player = {
    x: 300, y: 100, width: 30, height: 30,
    dx: 0, dy: 0,
    speed: 0.8, jumpPower: -12,
    damage: 0,
    isJumping: false,
    attackActive: false,
    attackTimer: 0,
    facing: 1 // 1: 右, -1: 左
};

// ステージ（浮いている足場）
const platform = { x: 150, y: 250, width: 300, height: 20 };

const keys = {};
window.addEventListener("keydown", e => keys[e.code] = true);
window.addEventListener("keyup", e => keys[e.code] = false);

// 攻撃ボタン（Zキー）
window.addEventListener("keydown", e => {
    if (e.code === "KeyZ" && !player.attackActive) {
        player.attackActive = true;
        player.attackTimer = 10; // 10フレーム攻撃判定
        
        // セルフダメージテスト用（本来は敵に当てるものですが、今回は動きの確認用）
        // もし「敵」がいたらここで判定処理を行います
    }
});

function update() {
    // 左右移動（慣性あり）
    if (keys.ArrowRight) { player.dx += player.speed; player.facing = 1; }
    if (keys.ArrowLeft) { player.dx -= player.speed; player.facing = -1; }
    
    // 摩擦
    player.dx *= FRICTION;
    
    // ジャンプ
    if (keys.Space && !player.isJumping) {
        player.dy = player.jumpPower;
        player.isJumping = true;
    }

    // 重力
    player.dy += GRAVITY;
    player.x += player.dx;
    player.y += player.dy;

    // 足場との当たり判定
    if (player.dy > 0 &&
        player.x + player.width > platform.x &&
        player.x < platform.x + platform.width &&
        player.y + player.height > platform.y &&
        player.y + player.height < platform.y + platform.height + 10) {
        player.y = platform.y - player.height;
        player.dy = 0;
        player.isJumping = false;
    } else {
        player.isJumping = true;
    }

    // 攻撃タイマー
    if (player.attackTimer > 0) {
        player.attackTimer--;
    } else {
        player.attackActive = false;
    }

    // 場外判定（バースト）
    if (player.x < -100 || player.x > canvas.width + 100 || player.y < -100 || player.y > canvas.height + 100) {
        // リセット
        player.x = 300; player.y = 100; player.dx = 0; player.dy = 0;
        player.damage = 0;
        damageDisplay.innerText = player.damage;
    }

    // 【デバッグ用】Xキーを押すと自分にダメージ（吹っ飛びの確認用）
    if (keys.KeyX) {
        player.damage += 1;
        damageDisplay.innerText = player.damage;
        // ダメージが大きいほど吹っ飛ぶ（ノックバック計算）
        player.dx = -player.facing * (player.damage / 10);
        player.dy = - (player.damage / 20);
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // ステージ描画
    ctx.fillStyle = "#777";
    ctx.fillRect(platform.x, platform.y, platform.width, platform.height);

    // プレイヤー描画
    ctx.fillStyle = player.attackActive ? "yellow" : "red";
    ctx.fillRect(player.x, player.y, player.width, player.height);

    // 攻撃判定の可視化
    if (player.attackActive) {
        ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
        ctx.fillRect(player.x + (player.facing === 1 ? player.width : -20), player.y + 5, 20, 20);
    }
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>視認性重視 - 鬼の目鏡</title>
    <style>
        body { margin: 0; overflow: hidden; background: #888; font-family: sans-serif; }
        #onime { 
            position: absolute; top: 10px; right: 10px; 
            width: 250px; height: 150px; 
            border: 5px solid red; background: #000; z-index: 100;
        }
        #ui { position: absolute; top: 10px; left: 10px; color: #000; z-index: 10; background: rgba(255,255,255,0.8); padding: 10px; }
    </style>
</head>
<body>
    <div id="ui">
        <b>画面が見えない場合のチェック：</b><br>
        1. 画面をクリックしてマウスを動かしてください。<br>
        2. WASDキーで移動できます。<br>
        3. 黄色の球体がカギ、青い巨大な壁がゴールです。
    </div>
    <div id="onime"></div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

// 1. シーンとレンダラー
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeeeeee); // 背景は明るいグレー

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const oniRenderer = new THREE.WebGLRenderer();
oniRenderer.setSize(250, 150);
document.getElementById('onime').appendChild(oniRenderer.domElement);

// 2. カメラ（位置を高くして埋まらないようにする）
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const oniCamera = new THREE.PerspectiveCamera(75, 250/150, 0.1, 100);

// 3. 地面（マス目をつけて「動いている感」を出す）
const grid = new THREE.GridHelper(200, 50, 0xff0000, 0x888888);
scene.add(grid);

// 4. 物体（光の影響を受けない MeshBasicMaterial を使用）
function addObj(w, h, d, x, z, color) {
    const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        new THREE.MeshBasicMaterial({ color: color })
    );
    mesh.position.set(x, h/2, z);
    scene.add(mesh);
    return mesh;
}

// わかりやすい目印を配置
addObj(5, 5, 5, -20, -20, 0x0000ff); // 青い箱
addObj(5, 10, 5, 20, -20, 0x00ff00); // 緑の柱
addObj(10, 15, 2, 0, -40, 0x00aaff); // ゴールの壁

// カギ（黄色い玉）
const key = new THREE.Mesh(new THREE.SphereGeometry(1), new THREE.MeshBasicMaterial({color: 0xffff00}));
key.position.set(0, 1, -20);
scene.add(key);

// 鬼（黒いデカい箱）
const oni = new THREE.Mesh(new THREE.BoxGeometry(3, 6, 3), new THREE.MeshBasicMaterial({color: 0x000000}));
scene.add(oni);

// 5. 操作
let playerPos = new THREE.Vector3(0, 2, 20); // プレイヤーの初期位置
let yaw = 0, pitch = 0;

document.addEventListener('click', () => document.body.requestPointerLock());
document.addEventListener('mousemove', (e) => {
    if (document.pointerLockElement === document.body) {
        yaw -= e.movementX * 0.002;
        pitch -= e.movementY * 0.002;
    }
});

const keys = {};
window.addEventListener('keydown', (e) => keys[e.code] = true);
window.addEventListener('keyup', (e) => keys[e.code] = false);

// 6. ループ
function animate() {
    requestAnimationFrame(animate);

    // 移動
    const move = new THREE.Vector3();
    if (keys['KeyW']) move.z -= 0.2;
    if (keys['KeyS']) move.z += 0.2;
    if (keys['KeyA']) move.x -= 0.2;
    if (keys['KeyD']) move.x += 0.2;
    move.applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
    playerPos.add(move);

    camera.position.copy(playerPos);
    camera.rotation.set(pitch, yaw, 0, 'YXZ');

    // 鬼が追いかけてくる
    oni.position.lerp(playerPos, 0.01);
    oni.position.y = 3;

    // 鬼の視界（右上）
    oniCamera.position.copy(oni.position);
    oniCamera.position.y = 5;
    oniCamera.lookAt(playerPos);

    renderer.render(scene, camera);
    oniRenderer.render(scene, oniCamera);
}
animate();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SNIPER CITY - MISSION: 50 ELIMINATIONS</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Courier New', monospace; }
        #ui { position: absolute; top: 20px; left: 20px; color: #000; pointer-events: none; z-index: 10; background: rgba(255,255,255,0.9); padding: 15px; border: 3px solid #333; border-radius: 8px; }
        .bar-container { width: 220px; height: 15px; background: rgba(0,0,0,0.1); margin-bottom: 8px; border: 2px solid #333; }
        #hp-bar { width: 100%; height: 100%; background: #ff5252; transition: width 0.3s; }
        #ammo-ui { font-size: 26px; font-weight: bold; margin-top: 5px; color: #1a237e; }
        #mission-ui { font-size: 20px; font-weight: bold; color: #d32f2f; }
        
        /* スナイパーレティクル */
        #reticle { position: absolute; top: 50%; left: 50%; width: 60px; height: 60px; transform: translate(-50%, -50%); pointer-events: none; z-index: 20; border: 1px solid rgba(0,0,0,0.5); border-radius: 50%; }
        .reticle-line { position: absolute; background: #000; }
        .v-line { left: 50%; width: 1px; height: 100%; transform: translateX(-50%); }
        .h-line { top: 50%; height: 1px; width: 100%; transform: translateY(-50%); }
        #ret-dot { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #f00; border-radius: 50%; transform: translate(-50%, -50%); }

        #minimap { position: absolute; top: 20px; right: 20px; border: 3px solid #333; background: #fff; z-index: 10; }
        .full-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 100; text-align: center; }
        #gameover-overlay { background: rgba(0,0,0,0.8); }
        #clear-overlay { background: rgba(0, 50, 150, 0.85); }
        button { padding: 20px 50px; font-size: 28px; background: #fff; color: #000; border: none; cursor: pointer; font-weight: bold; margin-top: 20px; }
        #msg { position: absolute; bottom: 30px; width: 100%; text-align: center; color: #000; font-weight: bold; font-size: 18px; text-shadow: 1px 1px 2px white; }
    </style>
</head>
<body>
    <div id="ui">
        HP <div class="bar-container"><div id="hp-bar"></div></div>
        <div id="ammo-ui"><span id="wp-name">Sniper Rifle</span>: <span id="ammo-cur">∞</span></div>
        <div id="mission-ui">REMAINING: <span id="kills-left">50</span> KILLS</div>
    </div>

    <div id="reticle">
        <div class="reticle-line v-line"></div>
        <div class="reticle-line h-line"></div>
        <div id="ret-dot"></div>
    </div>

    <canvas id="minimap" width="160" height="160"></canvas>
    
    <div id="gameover-overlay" class="full-overlay"><h1>MISSION FAILED</h1><button onclick="location.reload()">RETRY</button></div>
    <div id="clear-overlay" class="full-overlay"><h1>MISSION COMPLETE</h1><p>50体のターゲットを排除しました。</p><button onclick="location.reload()">RE-DEPLOY</button></div>

    <div id="msg">クリックで開始 | 矢印:移動 | SPACE:射撃 | [Shift]:ズーム | ENTER:武器切替</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const MISSION_GOAL = 50; // 目標を50に設定
        let killCount = 0;
        let hp = 100, isFinished = false;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 100, 300);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
        sunLight.position.set(50, 100, 50);
        scene.add(sunLight);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshPhongMaterial({color: 0x999999}));
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);

        for(let i=0; i<150; i++) {
            let x = (Math.random()-0.5)*1500, z = (Math.random()-0.5)*1500;
            if(Math.abs(x) > 30 || Math.abs(z) > 30) {
                const h = 10 + Math.random() * 50;
                const b = new THREE.Mesh(new THREE.BoxGeometry(15, h, 15), new THREE.MeshPhongMaterial({color: 0xffffff}));
                b.position.set(x, h/2, z);
                scene.add(b);
            }
        }

        const zombies = [], bullets = [], keys = {};
        const weapons = {
            1: { name: "Sniper Rifle", ammo: Infinity, cooldown: 1200, spread: 0, speed: 10.0, damage: 10 },
            2: { name: "Assault Rifle", ammo: 30, cooldown: 150, spread: 0.03, speed: 5.0, damage: 2 }
        };
        let wpIdx = 1, currentWp = weapons[wpIdx], lastShot = 0;

        function spawnZombie() {
            if (zombies.length >= 40 || isFinished) return; 

            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.8, 0.6), new THREE.MeshPhongMaterial({color: 0x2d4d29}));
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshPhongMaterial({color: 0x4a7c44}));
            head.position.y = 1.2;
            group.add(body); group.add(head);
            
            const ang = Math.random()*Math.PI*2;
            const dist = 60 + Math.random()*80; // 遠くに出現
            group.position.set(camera.position.x + Math.cos(ang)*dist, 0.9, camera.position.z + Math.sin(ang)*dist);
            
            group.userData = { hp: 2, speed: 0.015, head: head };
            zombies.push(group);
            scene.add(group);
        }

        for(let i=0; i<30; i++) spawnZombie();

        window.addEventListener('keydown', e => { 
            keys[e.code] = true;
            if(e.code === 'Enter') { wpIdx = (wpIdx % 2) + 1; currentWp = weapons[wpIdx]; }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);
        document.body.addEventListener('click', () => { if(!isFinished) document.body.requestPointerLock(); });

        function shoot() {
            const now = Date.now();
            if(now - lastShot < currentWp.cooldown) return;
            lastShot = now;

            const b = new THREE.Mesh(new THREE.SphereGeometry(0.12), new THREE.MeshBasicMaterial({color: 0xffff00}));
            b.position.copy(camera.position);
            const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            b.userData.vel = dir.normalize().multiplyScalar(currentWp.speed);
            b.userData.damage = currentWp.damage;
            bullets.push(b); scene.add(b);
        }

        let yaw = 0, pitch = 0;
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                const sense = keys['ShiftLeft'] ? 0.0004 : 0.002;
                yaw -= e.movementX * sense; pitch -= e.movementY * sense;
                pitch = Math.max(-1.5, Math.min(1.5, pitch));
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            if(isFinished) return;

            const targetFOV = keys['ShiftLeft'] ? 12 : 75; // より強力なズーム
            camera.fov += (targetFOV - camera.fov) * 0.1;
            camera.updateProjectionMatrix();

            if(hp <= 0) { isFinished = true; document.getElementById('gameover-overlay').style.display = 'flex'; document.exitPointerLock(); return; }
            if(killCount >= MISSION_GOAL) { isFinished = true; document.getElementById('clear-overlay').style.display = 'flex'; document.exitPointerLock(); return; }

            const move = new THREE.Vector3();
            if(keys['ArrowUp']) move.z -= 1; if(keys['ArrowDown']) move.z += 1;
            if(keys['ArrowLeft']) move.x -= 1; if(keys['ArrowRight']) move.x += 1;
            move.applyQuaternion(camera.quaternion); move.y = 0;
            camera.position.add(move.normalize().multiplyScalar(0.15));

            if(keys['Space']) shoot();
            if (zombies.length < 40 && Math.random() < 0.1) spawnZombie();

            zombies.forEach((z, zi) => {
                const dir = new THREE.Vector3().subVectors(camera.position, z.position).normalize();
                z.position.add(dir.multiplyScalar(z.userData.speed));
                z.rotation.y = Math.atan2(dir.x, dir.z);
                if(z.position.distanceTo(camera.position) < 2.0) hp -= 0.5;

                bullets.forEach((b, bi) => {
                    const headWorld = z.localToWorld(z.userData.head.position.clone());
                    if(b.position.distanceTo(headWorld) < 0.7) { // Headshot
                        killCount++; scene.remove(z); zombies.splice(zi,1);
                        scene.remove(b); bullets.splice(bi, 1);
                    } else if(b.position.distanceTo(z.position) < 1.3) { // Body
                        killCount++; scene.remove(z); zombies.splice(zi,1);
                        scene.remove(b); bullets.splice(bi, 1);
                    }
                });
            });

            bullets.forEach((b, i) => { 
                b.position.add(b.userData.vel); 
                if(b.position.distanceTo(camera.position)>600){ scene.remove(b); bullets.splice(i,1); } 
            });

            document.getElementById('hp-bar').style.width = hp + "%";
            document.getElementById('kills-left').innerText = Math.max(0, MISSION_GOAL - killCount);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
